<div class="min-h-screen bg-gray-50 flex flex-col">
  <!-- Navbar -->
  <header class="bg-premiumBlue text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between items-center h-16">

        <!-- Logo -->
        <div class="flex items-center">
          <span class="text-lg font-bold">Bishnupur Insaf Foundation</span>
        </div>

        <!-- Desktop Menu -->
        <nav class="hidden md:flex space-x-6 font-medium">
          <a routerLink="/">Dashboard</a>
          <a routerLink="/members">Members</a>
          <a routerLink="/donations">Donations</a>
          <a routerLink="/committees">Committees</a>
          <a routerLink="/news">News</a>
        </nav>

        <!-- Hamburger Button -->
        <button (click)="isOpen = !isOpen" class="md:hidden focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path *ngIf="!isOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16" />
            <path *ngIf="isOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Mobile Menu -->
      <div *ngIf="isOpen" class="md:hidden mt-2 space-y-2 pb-4">
        <a routerLink="/" class="block px-3 py-2">Dashboard</a>
        <a routerLink="/members" class="block px-3 py-2">Members</a>
        <a routerLink="/donations" class="block px-3 py-2">Donations</a>
        <a routerLink="/committees" class="block px-3 py-2">Committees</a>
        <a routerLink="/news" class="block px-3 py-2">News</a>
      </div>

    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 min-h-[500px]">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 mt-auto">
    <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
      <p class="text-center text-sm text-gray-500">&copy; 2026 Insaf Foundation Community. All rights reserved.</p>
    </div>
  </footer>
</div>
