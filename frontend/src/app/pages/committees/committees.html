<div class="container mx-auto p-6 md:p-12">
  <div class="text-center mb-12">
    <h1 class="text-4xl font-extrabold text-blue-900 tracking-tight">Our Committee</h1>
    <p class="text-gray-600 mt-3 text-lg">Meet the dedicated leaders of Insaf Foundation</p>
  </div>
  
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
    @for (member of members; track member.name) {
      <div class="bg-white rounded-2xl shadow-xl overflow-hidden transform transition duration-300 hover:-translate-y-2 hover:shadow-2xl border border-gray-100">
        <div class="h-64 overflow-hidden relative">
          <img [src]="member.imageUrl" [alt]="member.name" class="w-full h-full object-cover object-top">
          <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent opacity-0 text-white flex items-end justify-center pb-4 transition-opacity duration-300">
            <span class="font-medium text-sm drop-shadow-md">Insaf Foundation</span>
          </div>
        </div>
        <div class="p-6 text-center">
          <h2 class="text-2xl font-bold text-gray-800">{{ member.name }}</h2>
          <div class="inline-block px-4 py-1 mt-3 rounded-full bg-blue-100 text-blue-800 font-semibold text-sm shadow-sm">
            {{ member.role }}
          </div>
        </div>
      </div>
    }
  </div>
</div>
